<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#001824"/>
      <stop offset="100%" stop-color="#003a52"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4ad6ff"/>
      <stop offset="100%" stop-color="#7ee0ff"/>
    </linearGradient>
    <radialGradient id="glow" cx="80%" cy="20%" r="70%">
      <stop offset="0%" stop-color="#4ad6ff" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#4ad6ff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- TEACHFI wordmark, hand-drawn approximation -->
  <g transform="translate(80, 110)">
    <text x="0" y="100"
          font-family="Outfit, -apple-system, sans-serif"
          font-size="120" font-weight="800"
          fill="#ffffff" letter-spacing="-2">TEACH</text>
    <text x="540" y="100"
          font-family="Outfit, -apple-system, sans-serif"
          font-size="120" font-weight="300"
          fill="none" stroke="#ffffff" stroke-width="3"
          letter-spacing="-1">FI</text>
  </g>

  <!-- Headline -->
  <text x="80" y="320"
        font-family="Outfit, -apple-system, sans-serif"
        font-size="64" font-weight="800"
        fill="#ffffff" letter-spacing="-1.5">
    Simulator antreprenorial
  </text>
  <text x="80" y="395"
        font-family="Outfit, -apple-system, sans-serif"
        font-size="64" font-weight="800"
        fill="url(#accent)" letter-spacing="-1.5">
    pentru tineri fondatori.
  </text>

  <!-- Subhead -->
  <text x="80" y="465"
        font-family="Outfit, -apple-system, sans-serif"
        font-size="28" font-weight="400"
        fill="#87a3b6">
    De la simulare la acțiune. De la idei la startup.
  </text>

  <!-- Pills -->
  <g transform="translate(80, 510)">
    <rect x="0" y="0" rx="999" ry="999" width="200" height="44" fill="rgba(74,214,255,0.15)" stroke="rgba(74,214,255,0.4)"/>
    <text x="100" y="29" text-anchor="middle"
          font-family="Outfit, -apple-system, sans-serif"
          font-size="16" font-weight="700" fill="#4ad6ff">Built on Solana</text>

    <rect x="216" y="0" rx="999" ry="999" width="220" height="44" fill="rgba(74,214,255,0.15)" stroke="rgba(74,214,255,0.4)"/>
    <text x="326" y="29" text-anchor="middle"
          font-family="Outfit, -apple-system, sans-serif"
          font-size="16" font-weight="700" fill="#4ad6ff">5 ani validat la SRBan</text>

    <rect x="452" y="0" rx="999" ry="999" width="180" height="44" fill="rgba(74,214,255,0.15)" stroke="rgba(74,214,255,0.4)"/>
    <text x="542" y="29" text-anchor="middle"
          font-family="Outfit, -apple-system, sans-serif"
          font-size="16" font-weight="700" fill="#4ad6ff">13 module DeFi</text>
  </g>

  <!-- URL -->
  <text x="1120" y="600" text-anchor="end"
        font-family="Outfit, -apple-system, sans-serif"
        font-size="18" font-weight="600" fill="#87a3b6">
    teachfi.education
  </text>
</svg>
