---
layout: default
---
<section class="hero">
  <div class="wrap" style="max-width:760px;">
    <div class="eyebrow">
      <a href="{{ '/blog/' | relative_url }}" style="color:var(--brand);">← Înapoi la blog</a>
    </div>
    <h1 class="hero-title" style="font-size:clamp(32px,4vw,52px); margin-top:24px;">{{ page.title }}</h1>
    <p class="muted" style="margin-top:12px;">{{ page.date | date: "%d %B %Y" }}</p>
  </div>
</section>

<section class="section">
  <div class="wrap" style="max-width:760px; font-size:17px; line-height:1.8;">
    {{ content }}
  </div>
</section>
